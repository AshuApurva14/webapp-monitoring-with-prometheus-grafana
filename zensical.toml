# zensical.toml - example for "webapp-monitoring-with-prometheus-grafana"
[project]
site_name = "Webapp Monitoring with Prometheus & Grafana"
site_description = "Documentation for the webapp monitoring lab using Prometheus and Grafana."
site_author = "AshuApurva14"
#site_url = "https://example.com"   # set for production
language = "en"
copyright = """
Copyright © 2026 AshuApurva14
"""

features = [
  "announce.dismiss",
  "content.code.copy",
  "content.code.select",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight"
]

[project.theme]
# variant = "classic"
#custom_dir = "overrides"
#favicon = "assets/favicon.png"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# Optional: extra assets or overrides
#extra_css = ["stylesheets/extra.css"]
#extra_javascript = ["javascripts/extra.js"]